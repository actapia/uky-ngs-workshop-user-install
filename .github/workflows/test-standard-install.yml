name: test-standard-install

on:
  push:
    paths:
      - '.github/workflows/test-standard-install.yml'
      - 'standard_setup/vm_soft_setup.sh'
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

jobs:
  test-standard-install:
    name: Test standard installation script.
    strategy:
      matrix:
        ubuntu-version: [20.04, 22.04, 24.04]
    runs-on: ubuntu-latest
    # container: ubuntu:${{ matrix.ubuntu-version }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

          swap-storage: true

      - name: Install podman
        run: sudo apt update && sudo apt install podman

      - uses: actions/checkout@v4        

      - name: Start container
        run: >-
          echo container_id="$(
          sudo podman run -di
          -v "$PWD:/root/repo"
          docker.io/ubuntu:${{matrix.ubuntu-version}}
          )" >> "$GITHUB_ENV"
          
      - name: Update software
        env:
          NEEDRESTART_MODEE: a
          DEBIAN_FRONTEND: noninteractive
        run: >
          sudo podman exec --env NEEDRESTART_MODE --env DEBIAN_FRONTEND
          ${{env.container_id}} bash -c 'apt update && apt upgrade -y'
        
      - name: Install base software
        env:
          NEEDRESTART_MODEE: a          
          DEBIAN_FRONTEND: noninteractive
        run: >
          sudo podman exec --env NEEDRESTART_MODE --env DEBIAN_FRONTEND
          ${{env.container_id}} apt install -y sudo wget git openssh-server        
        
      - name: Prepare to connect to www.cs.uky.edu
        run: >
          sudo podman exec ${{env.container_id}}
          wget https://www.cs.uky.edu/~acta225/CS485/
        
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        
      - name: Test installation
        run: >
          sudo podman exec ${{env.container_id}}
          sudo bash /root/repo/standard_setup/vm_soft_setup.sh
